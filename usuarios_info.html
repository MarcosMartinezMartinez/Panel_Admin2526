<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Detalle Usuario</title>
    <link rel="stylesheet" href="style.css">
    <script src="usuarios_info.js" defer></script>
</head>

<body>

    <div class="contenedor detalle-container">

        <a href="#" class="btn-volver" onclick="history.back()">← Atras</a>

        <h1>Información del Usuario</h1>

        <div id="infoUsuario">
            <h2 id="nombreUsuario"></h2>
            <p id="emailUsuario"></p>
            <p id="rolUsuario"></p>
            <p id="puestoUsuario"></p>
        </div>

        <hr>

        <!-- FILTRO MES -->
        <div class="filtro-mes">
            <label>Seleccionar mes:</label>
            <input type="month" id="selectorMes" onchange="cambiarMes()">
        </div>

        <hr>

        <!-- TURNOS -->
        <h3>Turnos</h3>

        <div class="acciones-turnos">
            <button onclick="editarTurnosSeleccionados()" class="btn">
                Editar seleccionados
            </button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Seleccionar</th>
                    <th>Turno</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                </tr>
            </thead>

            <tbody id="tablaTurnosBody"></tbody>
        </table>

        <hr>

        <!-- FICHAJES -->
        <h3>Fichajes</h3>

        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Entrada</th>
                    <th>Salida</th>
                    <th>Horas trabajadas</th>
                </tr>
            </thead>
            <tbody id="tablaFichajesBody"></tbody>
        </table>

        <h3>Total horas trabajadas: <span id="totalHoras">0</span></h3>

    </div>

    <div id="modalTurnos" class="modal">
        <div class="modal-content">

            <span class="close" onclick="cerrarModal()">&times;</span>

            <h3>Editar turnos</h3>

            <!-- SOLO PRODUCCIÓN -->
            <div class="campo" id="grupoTipoTurno" style="display:none;">
                <label>Tipo turno</label>
                <select id="tipoTurnoSelect">
                    <option value="MAÑANA">MAÑANA</option>
                    <option value="TARDE">TARDE</option>
                    <option value="NOCHE">NOCHE</option>
                </select>
            </div>

            <div class="campo">
                <label>Hora inicio</label>
                <input type="time" id="horaInicioInput">
            </div>

            <div class="campo">
                <label>Hora fin</label>
                <input type="time" id="horaFinInput">
            </div>

            <div class="botones">
                <button onclick="guardarCambiosTurnos()">Guardar</button>
                <button class="cancelar" onclick="cerrarModal()">Cancelar</button>
            </div>

        </div>
    </div>

</body>

</html>
